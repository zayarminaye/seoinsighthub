name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: seoaudits
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: seoaudits/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm test

      - name: Typecheck
        run: npx tsc --noEmit --incremental false

  e2e:
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: seoaudits
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: seoaudits_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d seoaudits_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/seoaudits_ci?schema=public
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_e2e_dummy
      CLERK_SECRET_KEY: sk_test_e2e_dummy
      CLERK_WEBHOOK_SECRET: whsec_e2e_dummy
      E2E_PORT: "3100"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: seoaudits/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
